# ======================================================
# Azure POC - Spring Boot Configuration
# ======================================================

# Server — Windows App Service usa HTTP_PLATFORM_PORT, fallback a PORT o 8080
server.port=${HTTP_PLATFORM_PORT:${PORT:8080}}

# ======================================================
# H2 In-Memory Database (POC only)
# For production: switch to Azure SQL or PostgreSQL
# ======================================================
spring.datasource.url=jdbc:h2:mem:pocdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=false

# H2 console (disable in production)
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# ======================================================
# Actuator (health probes for Azure)
# ======================================================
management.endpoints.web.exposure.include=health,info,metrics
management.endpoint.health.show-details=always

# ======================================================
# Logging
# ======================================================
logging.level.com.azure.poc=INFO
logging.level.org.springframework=WARN
logging.level.root=WARN

# ======================================================
# Static resources — Vue build output is served from here
# ======================================================
spring.web.resources.static-locations=classpath:/static/
spring.mvc.view.suffix=
