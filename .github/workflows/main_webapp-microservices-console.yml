name: Build and deploy Node.js app to Azure Web App - webapp-microservices-console

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install

      - name: Build frontend (Vite)
        run: npm run build
        env:
          NODE_ENV: production

      - name: Zip artifact for deployment
        run: zip -r release.zip . --exclude="*.git*" --exclude="node_modules/.cache/*"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: node-app
          path: release.zip

  deploy:
    runs-on: ubuntu-latest
    needs: build
    permissions:
      id-token: write
      contents: read

    steps:
      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: node-app

      - name: Login to Azure
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZUREAPPSERVICE_CLIENTID_3CBD36C6D1834B3BAA1763E1D1FE5278 }}
          tenant-id: ${{ secrets.AZUREAPPSERVICE_TENANTID_C4C084F2E3D040739F3B2E276625B753 }}
          subscription-id: ${{ secrets.AZUREAPPSERVICE_SUBSCRIPTIONID_28EF0F15D35948619568A1297063506B }}

      - name: Deploy to Azure Web App
        uses: azure/webapps-deploy@v3
        with:
          app-name: 'webapp-microservices-console'
          slot-name: 'Production'
          package: release.zip
